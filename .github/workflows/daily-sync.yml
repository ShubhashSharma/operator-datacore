name: Daily Sync

# Pulls the last 30 days of Sales & Traffic data from SP-API into your
# Supabase database. Idempotent — re-running re-syncs without duplicating.
#
# To enable:
# 1. Fork or clone this repo to your GitHub account.
# 2. In your repo's Settings → Secrets and variables → Actions, add the
#    secrets listed under env: below. Use the same values as your local .env.
# 3. Enable Actions in the Actions tab if it isn't already.
#
# Schedule: 15:00 UTC daily. Sales & Traffic data lands by 14:00 UTC, so
# 15:00 gives Amazon an hour of buffer.

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      months:
        description: 'How many months back to pull (default: 1 = last 30 days)'
        type: string
        default: '1'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull Sales & Traffic
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
          SP_API_MARKETPLACE_IDS: ${{ secrets.SP_API_MARKETPLACE_IDS }}
        run: |
          MONTHS="${{ github.event.inputs.months || '1' }}"
          npm run backfill -- --source amazon --report sales-traffic --months "$MONTHS" --concurrency 2

      - name: Roll up rollups
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
        run: |
          # pg_cron handles this on a 14:30 UTC schedule too, but a fresh roll
          # right after the sync gives the cleanest dashboard read.
          node --input-type=module -e "
            import('pg').then(async ({ Client }) => {
              const c = new Client({ connectionString: process.env.SUPABASE_DB_URL, ssl: { rejectUnauthorized: false } });
              await c.connect();
              const r = await c.query('SELECT * FROM ops.refresh_all_daily()');
              console.log('Rollups refreshed:', r.rowCount, 'rows');
              await c.end();
            });
          "
